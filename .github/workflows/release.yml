name: Auto Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/plant_ai.apk
          name: Latest Release
          tag_name: latest
          draft: false
          prerelease: false
          generate_release_notes: true
